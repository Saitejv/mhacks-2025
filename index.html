<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do | MHacks 2025</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Smart To-Do</h1>
            <p class="subtitle">Intelligent task management with time-based recommendations</p>
        </header>

        <!-- Time Input Panel -->
        <section class="time-panel">
            <h2>Available Time</h2>
            <div class="time-input-group">
                <input type="number" id="available-time" placeholder="30" min="1" max="480">
                <span>minutes</span>
                <button id="get-recommendation" class="btn btn-primary">Get Recommendation</button>
            </div>
        </section>

        <!-- Recommendation Panel -->
        <section class="recommendation-panel" id="recommendation-panel" style="display: none;">
            <h2>Recommended Task</h2>
            <div id="recommended-task" class="task-recommendation">
                <!-- Recommended task will be displayed here -->
            </div>
            <div id="alternative-tasks" class="alternative-tasks">
                <h3>Alternatives</h3>
                <!-- Alternative tasks will be displayed here -->
            </div>
        </section>

        <!-- Task Creation -->
        <section class="task-creation">
            <h2>Add New Task</h2>
            <form id="task-form">
                <div class="form-group">
                    <input type="text" id="task-title" placeholder="Task title" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Duration (minutes)</label>
                        <input type="number" id="task-duration" placeholder="30" min="1" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Priority</label>
                        <select id="task-priority" required>
                            <option value="">Select priority</option>
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Dependencies (optional)</label>
                    <select id="task-dependencies" multiple>
                        <!-- Options will be populated dynamically -->
                    </select>
                    <small>Hold Ctrl/Cmd to select multiple tasks</small>
                </div>
                
                <button type="submit" class="btn btn-primary">Add Task</button>
            </form>
        </section>

        <!-- Task List -->
        <section class="task-list">
            <h2>Tasks</h2>
            <div class="task-filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="available">Available</button>
                <button class="filter-btn" data-filter="blocked">Blocked</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            <div id="tasks-container" class="tasks-container">
                <!-- Tasks will be displayed here -->
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
